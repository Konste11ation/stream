name: generic_array
type: compute
memories:
  rf_I:
    size: 1024
    r_cost: 0.095
    w_cost: 0.095
    area: 0
    latency: 1
    operands: [I1]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 16
        bandwidth_max: 16
        allocation: 
          - I1, tl
      - name: w_port_1
        type: write
        bandwidth_min: 16
        bandwidth_max: 16
        allocation: 
          - I1, fh
    served_dimensions: []

  rf_W: # For MatMul, this will store activations
    size: 1024
    r_cost: 0.095
    w_cost: 0.095
    area: 0
    latency: 1
    operands: [I2]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 16
        bandwidth_max: 16
        allocation: 
          - I2, tl
      - name: w_port_1
        type: write
        bandwidth_min: 16
        bandwidth_max: 16
        allocation: 
          - I2, fh
    served_dimensions: []

  rf_O:
    size: 1024
    r_cost: 0.095
    w_cost: 0.095
    area: 0
    latency: 1
    operands: [O]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, tl
      - name: r_port_2
        type: read
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, th
      - name: w_port_1
        type: write
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, fh
      - name: w_port_2
        type: write
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, fl
    served_dimensions: []


  sram_32MB: # From FLAT paper: 8 Tbit/s on-chip BW
    size: 268435456
    r_cost: 416.16
    w_cost: 378.4
    area: 0
    latency: 1
    operands: [I1, I2, O]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 64
        bandwidth_max: 16384
        allocation: 
          - I1, tl
          - O, tl
          - O, th
      - name: r_port_2
        type: read
        bandwidth_min: 64
        bandwidth_max: 16384
        allocation: 
          - I2, tl
          - O, tl
          - O, th
      - name: w_port_1
        type: write
        bandwidth_min: 64
        bandwidth_max: 16384
        allocation: 
          - I1, fh
          - O, fh
          - O, fl
      - name: w_port_2
        type: write
        bandwidth_min: 64
        bandwidth_max: 16384
        allocation: 
          - I2, fh
          - O, fh
          - O, fl
    served_dimensions: [D1, D2]

operational_array:
  unit_energy: 0
  unit_area: 1 # unit
  dimensions: [D1, D2]
  sizes: [256, 256]
dataflows:
  D1:
    - D, 256
  D2:
    - K, 256
