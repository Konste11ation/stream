name: vec
type: compute
memories:
  rf_I:
    size: 1024
    r_cost: 0.095
    w_cost: 0.095
    area: 0
    latency: 1
    operands: [I1]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 16
        bandwidth_max: 16
        allocation: 
          - I1, tl
      - name: w_port_1
        type: write
        bandwidth_min: 16
        bandwidth_max: 16
        allocation: 
          - I1, fh
    served_dimensions: []
  rf_W: # For MatMul, this will store activations
    size: 1024
    r_cost: 0.095
    w_cost: 0.095
    area: 0
    latency: 1
    operands: [I2]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 16
        bandwidth_max: 16
        allocation: 
          - I2, tl
      - name: w_port_1
        type: write
        bandwidth_min: 16
        bandwidth_max: 16
        allocation: 
          - I2, fh
    served_dimensions: []

  rf_O:
    size: 1024
    r_cost: 0.095
    w_cost: 0.095
    area: 0
    latency: 1
    operands: [O]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, tl
      - name: r_port_2
        type: read
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, th
      - name: w_port_1
        type: write
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, fh
      - name: w_port_2
        type: write
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, fl
    served_dimensions: []

  sram_2MB:
    size: 67108864
    r_cost: 416.16
    w_cost: 378.4
    area: 0
    latency: 1
    operands: [I1, I2, O]
    ports:
      - name: rw_port_1
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 256
        allocation: 
          - I1, tl
      - name: rw_port_2
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 256
        allocation: 
          - I2, tl
      - name: rw_port_3
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 256
        allocation: 
          - O, tl
          - O, fl
      - name: rw_port_4  # DMA port
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 256
        allocation: 
          - I1, fh
          - I2, fh
          - O, fh
          - O, th
    served_dimensions: [D1, D2]

operational_array:
  input_precision: [8, 8]
  unit_energy: 0.04 # pJ
  unit_area: 1 # unit
  dimensions: [D1, D2]
  sizes: [32, 1]
