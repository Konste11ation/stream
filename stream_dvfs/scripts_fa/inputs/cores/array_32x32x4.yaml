name: generic_array
type: compute
memories:
  reg_O:
    size: 256
    r_cost: 0.02  # TODO
    w_cost: 0.02  # TODO
    area: 0
    latency: 1
    auto_cost_extraction: False
    operands: [O]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 64
        bandwidth_max: 128
        allocation: 
          - O, tl
      - name: r_port_2
        type: read
        bandwidth_min: 64
        bandwidth_max: 128
        allocation: 
          - O, th
      - name: w_port_1
        type: write
        bandwidth_min: 64
        bandwidth_max: 128
        allocation: 
          - O, fh
      - name: w_port_2
        type: write
        bandwidth_min: 64
        bandwidth_max: 128
        allocation: 
          - O, fl
    served_dimensions: [D3]

  sram_512KB:
    size: 4194304
    r_cost: 104
    w_cost: 94
    area: 0
    latency: 1
    operands: [I1, I2, O]
    ports:
      - name: rw_port_1
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 512
        allocation: 
          - I1, tl
      - name: rw_port_2
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 512
        allocation: 
          - I2, tl
      - name: rw_port_3
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 2048
        allocation: 
          - O, tl
          - O, fl
      - name: rw_port_4  # DMA port
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 512
        allocation: 
          - I1, fh
          - I2, fh
          - O, fh
          - O, th
    served_dimensions: [D1, D2, D3]

operational_array:
  input_precision: [8, 8]
  unit_energy: 1 # pJ/MAC
  unit_area: 1 # unit
  dimensions: [D1, D2, D3]
  sizes: [32, 32, 8]


