name: balanced_df_16_16_16
type: compute
memories:
  rf_O:
    size: 32
    r_cost: 0.8
    w_cost: 0.8
    area: 0
    latency: 1
    operands: [O]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, tl
      - name: w_port_1
        type: write
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, fh
      - name: r_port_2
        type: read
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, th
      - name: w_port_2
        type: write
        bandwidth_min: 32
        bandwidth_max: 32
        allocation: 
          - O, fl
    served_dimensions: []

  sram_1MB:
    size: 8388608 # in bits, 1MB
    r_cost: 2048  # /4 compared to FLAT paper since 4x less bandwidth
    w_cost: 2048  # /4 compared to FLAT paper since 4x less bandwidth
    area: 0
    latency: 1
    operands: [I1, I2, O]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 8192
        bandwidth_max: 8192
        allocation: 
          - I1, tl
      - name: w_port_1
        type: write
        bandwidth_min: 8192
        bandwidth_max: 8192
        allocation: 
          - I1, fh
      - name: r_port_2
        type: read
        bandwidth_min: 8192
        bandwidth_max: 8192
        allocation: 
          - I2, tl
      - name: w_port_2
        type: write
        bandwidth_min: 8192
        bandwidth_max: 8192
        allocation: 
          - I2, fh
      - name: r_port_3
        type: read
        bandwidth_min: 8192
        bandwidth_max: 8192
        allocation: 
          - O, tl
          - O, th
      - name: w_port_3
        type: write
        bandwidth_min: 8192
        bandwidth_max: 8192
        allocation: 
          - O, fl
          - O, fh
    served_dimensions: [D1, D2, D3]

operational_array:
  input_precision: [8, 32]
  unit_energy: 1.5
  unit_area: 1 # unit
  dimensions: [D1, D2, D3]  # D2 is accumulation dimension (Cu in ZigZag)
  sizes: [16, 16, 16]