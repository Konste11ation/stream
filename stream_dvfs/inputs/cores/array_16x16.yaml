name: generic_array
type: compute
memories:
  sram_256KB_O:
    size: 2097152
    r_cost: 123.2
    w_cost: 212.8
    area: 0
    latency: 1
    operands: [O]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 64
        bandwidth_max: 512
        allocation: 
          - O, tl
          - O, th
      - name: w_port_1
        type: write
        bandwidth_min: 64
        bandwidth_max: 512
        allocation: 
          - O, fh
          - O, fl
    served_dimensions: []
  l1_32MB:
    size: 268435456
    r_cost: 416.16
    w_cost: 378.4
    area: 0
    latency: 1
    operands: [I1, I2, O]
    ports:
      - name: rw_port_1
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 512
        allocation: 
          - I1, tl
      - name: rw_port_2
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 2048
        allocation: 
          - I2, tl
      - name: rw_port_3
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 2048
        allocation: 
          - O, tl
          - O, fl
      - name: rw_port_4  # DMA port
        type: read_write
        bandwidth_min: 64
        bandwidth_max: 512
        allocation: 
          - I1, fh
          - I2, fh
          - O, fh
          - O, th
    served_dimensions: [D1, D2]

operational_array:
  input_precision: [8, 8]
  unit_energy: 1 # pJ
  unit_area: 1 # unit
  dimensions: [D1, D2]
  sizes: [16, 16]


