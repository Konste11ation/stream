name: 3_core_vec_array
cores:
  0: stream_dvfs/inputs/cores/array_64.yaml
  1: stream_dvfs/inputs/cores/array_64.yaml
  2: stream_dvfs/inputs/cores/array_64.yaml
  3: stream_dvfs/inputs/cores/vec_128.yaml
  4: stream_dvfs/inputs/cores/offchip.yaml
offchip_core_id: 4
core_connectivity:
  # ───────── 2-D mesh links (bandwidth 512 each) ─────────
  # - {type: link, cores: [0, 1],  bandwidth: 512}
  # - {type: link, cores: [1, 2],  bandwidth: 512}
  #   # ───── SIMD core ─────
  # - {type: link, cores: [0, 3],  bandwidth: 512}
  - type: bus
    cores: [0, 1, 2, 3, 4]     # all chiplets + DRAM ctrl
    bandwidth: 512